<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Carmageddon — Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        #canvas-wrap {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        canvas.emscripten {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            outline: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #status {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: rgba(0,0,0,0.75);
            border-radius: 6px;
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        #status.hidden { opacity: 0; }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            z-index: 100;
        }
        #loading.hidden { display: none; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #c41e1e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">Loading WASM…</p>
    </div>

    <div id="status">Starting…</div>
    <div id="canvas-wrap">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault();"></canvas>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
                regs.forEach(function (reg) { reg.unregister(); });
            });
        }

        var Module = {
            canvas: document.getElementById('canvas'),
            arguments: ['--opengl', '--window', '-nocutscenes', '-simple', '2', '-yon', '0.8'],
            onRuntimeInitialized: function () {
                document.getElementById('loading').classList.add('hidden');
                var status = document.getElementById('status');
                status.textContent = 'Carmageddon';
                setTimeout(function () { status.classList.add('hidden'); }, 2500);
            },
            setStatus: function (text) {
                var el = document.getElementById('loading-text');
                if (el) el.textContent = text;
                var status = document.getElementById('status');
                if (status) status.textContent = text;
            },
            monitorRunDependencies: function (left) {
                if (left > 0) {
                    Module.setStatus('Loading assets… (' + left + ' remaining)');
                }
            },
            onAbort: function (reason) {
                document.getElementById('loading-text').textContent = 'Error: ' + reason;
                console.error('WASM abort:', reason);
            }
        };
    </script>
    <script async src="carmaweb.js" onerror="document.getElementById('loading-text').textContent='Failed to load carmaweb.js'"></script>
</body>
</html>
